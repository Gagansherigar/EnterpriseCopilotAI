events {}

http {
    include /etc/nginx/mime.types;   # ✅ REQUIRED

    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # Serve static files correctly
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Force correct MIME for JS (extra safety)
        location ~* \.js$ {
            add_header Content-Type application/javascript;
        }
    }
}